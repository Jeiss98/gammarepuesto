<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-isotipo">
        <img src="isotipo.png" alt="Gama">
      </div>
      <div class="sidebar-brandtext">
        <div class="sidebar-name">GAMA <span>REPUESTOS</span></div>
        <div class="sidebar-role">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Gestión</div>
      <a *ngFor="let item of menuItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="sidebar-link">
        <span class="sidebar-link-icon" [innerHTML]="item.svg"></span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" *ngIf="user">
        <div class="user-avatar">{{ (user.name || user.email || 'A').charAt(0).toUpperCase() }}</div>
        <div class="user-info">
          <div class="user-name">{{ user.name || 'Administrador' }}</div>
          <div class="user-email">{{ user.email }}</div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
          <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-title">Panel de Administración</div>
      <div class="topbar-right">
        <div class="topbar-time">{{ user?.email }}</div>
      </div>
    </header>
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
