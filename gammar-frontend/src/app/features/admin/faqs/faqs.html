<div class="admin-page">
  <div class="page-header">
    <h1>Preguntas Frecuentes (FAQs)</h1>
    <button mat-raised-button color="primary" (click)="nuevo()" *ngIf="!mostrarForm">
      <mat-icon>add</mat-icon> Nueva Pregunta
    </button>
  </div>

  <div *ngIf="mostrarForm" class="form-container">
    <form [formGroup]="form" (ngSubmit)="guardar()" class="faq-form">
      <h3>{{ editando ? 'Editar Pregunta' : 'Nueva Pregunta' }}</h3>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Pregunta</mat-label>
        <input matInput formControlName="pregunta">
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Respuesta</mat-label>
        <textarea matInput formControlName="respuesta" rows="4"></textarea>
      </mat-form-field>
      
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Orden</mat-label>
          <input matInput type="number" formControlName="orden">
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button type="button" mat-button (click)="cancelar()">Cancelar</button>
        <button type="submit" mat-raised-button color="primary" [disabled]="form.invalid">Guardar</button>
      </div>
    </form>
  </div>

  <div *ngIf="!mostrarForm" class="table-container">
    <div *ngIf="cargando" class="loading">Cargando FAQs...</div>
    
    <table mat-table [dataSource]="faqs" *ngIf="!cargando && faqs.length > 0" class="mat-elevation-z2">
      
      <ng-container matColumnDef="orden">
        <th mat-header-cell *matHeaderCellDef> Orden </th>
        <td mat-cell *matCellDef="let element"> {{element.orden}} </td>
      </ng-container>

      <ng-container matColumnDef="pregunta">
        <th mat-header-cell *matHeaderCellDef> Pregunta </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.pregunta}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="respuesta">
        <th mat-header-cell *matHeaderCellDef> Respuesta </th>
        <td mat-cell *matCellDef="let element"> {{element.respuesta}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="editar(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(element)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>

    <div *ngIf="!cargando && faqs.length === 0" class="empty-state">
      No hay preguntas frecuentes registradas.
    </div>
  </div>
</div>
